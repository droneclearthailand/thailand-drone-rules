name: Competitor Monitor (Weekly)

on:
  schedule:
    - cron: '0 2 * * 1'   # Monday 02:00 UTC = 09:00 Thailand time
  workflow_dispatch:        # manual trigger for testing from Actions tab

jobs:
  competitor-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit updated snapshots

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 anthropic

      - name: Run competitor monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python competitor_monitor.py

      - name: Commit updated competitor snapshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add competitor_snapshots/
          git diff --cached --quiet || git commit -m "chore: update competitor snapshots [skip ci]"
          git push

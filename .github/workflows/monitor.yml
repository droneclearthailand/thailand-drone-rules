name: Monitor Thailand Drone Rules

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC = 09:00 Thailand time
  workflow_dispatch:       # allow manual trigger from Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to commit LAST_VERIFIED date update

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 anthropic

      - name: Run monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python monitor.py

      - name: Commit updated LAST_VERIFIED date (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js snapshots/
          git diff --cached --quiet || git commit -m "chore: update LAST_VERIFIED and snapshots [skip ci]"
          git push
